<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - VintedSniper</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06060f;--bg2:#111122;--accent:#2cb5ff;--accent2:#7f5af0;--text:#f1f2ff;--text2:#a3a6c9;--red:#ff5f73;--green:#3ad29f}
        body{font-family:Inter,'Segoe UI',system-ui,sans-serif;background:radial-gradient(900px 450px at 20% -20%,rgba(127,90,240,0.28),transparent),radial-gradient(900px 450px at 90% -30%,rgba(44,181,255,0.24),transparent),var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .auth-box{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:40px;width:100%;max-width:430px;margin:20px;box-shadow:0 24px 60px rgba(0,0,0,0.45)}
        .logo{font-size:25px;font-weight:900;letter-spacing:-.3px;background:linear-gradient(135deg,#fff,#b6e0ff,#d2c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
        .subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
        input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-size:15px;outline:none;transition:0.2s}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
        .btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(44,181,255,0.3)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .error{background:rgba(231,76,60,0.1);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .success{background:rgba(46,204,113,0.1);border:1px solid var(--green);color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .links{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
        .links a{color:var(--accent)}
        .icon{text-align:center;font-size:48px;margin-bottom:16px}
        .password-rules{font-size:12px;color:var(--text2);margin-top:6px}
    </style>
</head>
<body>
<div class="auth-box">
    <div class="icon">🔒</div>
    <div class="logo">VintedSniper</div>
    <div class="subtitle">Choisis un nouveau mot de passe pour securiser ton compte.</div>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <form id="resetForm">
        <div class="form-group">
            <label>Nouveau mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="6">
            <div class="password-rules">Minimum 6 caracteres</div>
        </div>
        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="password2" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn" id="submitBtn">Changer le mot de passe</button>
    </form>
    <div class="links">
        <a href="/login">Retour a la connexion</a>
    </div>
</div>
<script>
// Recuperer le token depuis l'URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
    document.getElementById('error').textContent = 'Lien invalide. Demande un nouveau lien.';
    document.getElementById('error').style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    error.style.display = 'none';
    success.style.display = 'none';

    if (password !== password2) {
        error.textContent = 'Les mots de passe ne correspondent pas';
        error.style.display = 'block';
        return;
    }

    if (password.length < 6) {
        error.textContent = 'Le mot de passe doit faire au moins 6 caracteres';
        error.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Modification...';

    try {
        const resp = await fetch('/api/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ token: token, password: password })
        });
        const data = await resp.json();
        if (data.success) {
            success.textContent = data.message + ' Redirection...';
            success.style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
            setTimeout(() => { window.location.href = '/login'; }, 2000);
        } else {
            error.textContent = data.error || 'Erreur';
            error.style.display = 'block';
        }
    } catch(err) {
        error.textContent = 'Erreur reseau';
        error.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Changer le mot de passe';
});
</script>
</body>
</html>
