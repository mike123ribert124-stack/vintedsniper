<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - VintedSniper</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06060f;--bg2:#111122;--accent:#2cb5ff;--accent2:#7f5af0;--text:#f1f2ff;--text2:#a3a6c9;--red:#ff5f73}
        body{font-family:Inter,'Segoe UI',system-ui,sans-serif;background:radial-gradient(900px 450px at 20% -20%,rgba(127,90,240,0.28),transparent),radial-gradient(900px 450px at 90% -30%,rgba(44,181,255,0.24),transparent),var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .auth-box{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:40px;width:100%;max-width:430px;margin:20px;box-shadow:0 24px 60px rgba(0,0,0,0.45)}
        .logo{font-size:25px;font-weight:900;letter-spacing:-.3px;background:linear-gradient(135deg,#fff,#b6e0ff,#d2c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
        .subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
        input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-size:15px;outline:none;transition:0.2s}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
        .btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(44,181,255,0.3)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .error{background:rgba(231,76,60,0.1);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .links{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
        .links a{color:var(--accent)}
    </style>
</head>
<body>
<div class="auth-box">
    <div class="logo">VintedSniper</div>
    <div class="subtitle">Connecte-toi et reprends tes recherches en 1 clic.</div>
    <div class="error" id="error"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ton@email.com" required>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">Se connecter</button>
    </form>
    <div class="links">
        <a href="/forgot-password">Mot de passe oublie ?</a>
        <br><br>
        Pas encore de compte ? <a href="/register">Creer un compte</a>
        <br><br>
        <a href="/">Retour a l'accueil</a>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = 'Connexion...';
    error.style.display = 'none';

    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            error.textContent = data.error || 'Erreur de connexion';
            error.style.display = 'block';
        }
    } catch(err) {
        error.textContent = 'Erreur reseau';
        error.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Se connecter';
});
</script>
</body>
</html>
