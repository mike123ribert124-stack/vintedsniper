<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublie - VintedSniper</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a1a;--bg2:#111128;--accent:#00d4ff;--accent2:#7c3aed;--text:#e0e0f0;--text2:#8888aa;--red:#e74c3c;--green:#2ecc71}
        body{font-family:Inter,'Segoe UI',system-ui,sans-serif;background:radial-gradient(900px 400px at 50% -20%,rgba(124,58,237,0.2),transparent),var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .auth-box{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:420px;margin:20px;box-shadow:0 20px 60px rgba(0,0,0,0.35)}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
        .subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
        input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-size:15px;outline:none;transition:0.2s}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
        .btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.3)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .error{background:rgba(231,76,60,0.1);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .success{background:rgba(46,204,113,0.1);border:1px solid var(--green);color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .links{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
        .links a{color:var(--accent)}
        .icon{text-align:center;font-size:48px;margin-bottom:16px}
    </style>
</head>
<body>
<div class="auth-box">
    <div class="icon">🔑</div>
    <div class="logo">VintedSniper</div>
    <div class="subtitle">Entre ton email pour recevoir un lien de reinitialisation securise.</div>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <form id="forgotForm">
        <div class="form-group">
            <label>Adresse email</label>
            <input type="email" id="email" placeholder="ton@email.com" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">Envoyer le lien</button>
    </form>
    <div class="links">
        <a href="/login">Retour a la connexion</a>
        <br><br>
        <a href="/">Retour a l'accueil</a>
    </div>
</div>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours...';
    error.style.display = 'none';
    success.style.display = 'none';

    try {
        const resp = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('email').value,
            })
        });
        const data = await resp.json();
        if (data.success) {
            document.getElementById('forgotForm').style.display = 'none';
            success.textContent = data.message || 'Si cet email existe, un lien de reinitialisation a ete envoye.';
            success.style.display = 'block';
        } else {
            error.textContent = data.error || 'Erreur';
            error.style.display = 'block';
        }
    } catch(err) {
        error.textContent = 'Erreur reseau';
        error.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
});
</script>
</body>
</html>
