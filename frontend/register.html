<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - VintedSniper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #080810; --gold: #d4a843; --gold2: #f0c060;
            --gold-dim: rgba(212,168,67,.15); --gold-line: rgba(212,168,67,.32);
            --glass: rgba(255,255,255,.04); --line: rgba(255,255,255,.09); --line2: rgba(255,255,255,.14);
            --text: #eef0ff; --text2: #7a7f9d; --text3: #b0b4cc;
            --green: #2dd98a; --red: #ff5573; --red-dim: rgba(255,85,115,.12);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; top: -180px; left: 50%;
            transform: translateX(-50%); width: 700px; height: 400px;
            background: radial-gradient(ellipse, rgba(212,168,67,.1), transparent 70%);
            pointer-events: none;
        }
        .auth-box {
            background: var(--glass); backdrop-filter: blur(18px);
            border: 1px solid var(--line2); border-radius: 22px;
            padding: 42px 38px; width: 100%; max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,.5);
            position: relative; z-index: 1;
        }
        .logo {
            display: block; text-align: center;
            font-size: 22px; font-weight: 900; letter-spacing: -.4px;
            background: linear-gradient(135deg, #fff 30%, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px; text-decoration: none;
        }
        .subtitle { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text2); margin-bottom: 7px; }
        input {
            width: 100%; padding: 12px 15px; border-radius: 11px;
            border: 1px solid var(--line2); background: rgba(255,255,255,.04);
            color: var(--text); font-size: 15px; outline: none;
            transition: border-color .2s; font-family: inherit;
        }
        input:focus { border-color: var(--gold-line); box-shadow: 0 0 0 3px rgba(212,168,67,.1); }
        input::placeholder { color: var(--text2); }
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 800; cursor: pointer; transition: all .25s;
            font-family: inherit;
        }
        .btn-gold { background: linear-gradient(135deg, #c9930a, var(--gold2)); color: #0d0a00; box-shadow: 0 6px 22px rgba(212,168,67,.3); }
        .btn-gold:hover { box-shadow: 0 10px 30px rgba(212,168,67,.45); transform: translateY(-2px); }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .alert { padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 18px; display: none; }
        .alert-error { background: var(--red-dim); border: 1px solid rgba(255,85,115,.3); color: var(--red); }
        .perks { display: flex; flex-direction: column; gap: 7px; margin-bottom: 24px; }
        .perk { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--text3); }
        .perk::before { content: '✓'; color: var(--green); font-weight: 800; flex-shrink: 0; }
        .links { text-align: center; margin-top: 22px; font-size: 13px; color: var(--text2); line-height: 2; }
        .links a { color: var(--gold2); text-decoration: none; }
        .links a:hover { opacity: .8; }
        .divider { height: 1px; background: var(--line); margin: 22px 0; }
    </style>
</head>
<body>
<div class="auth-box">
    <a href="/" class="logo">⚡ VintedSniper</a>
    <div class="subtitle">Crée ton compte et snipe les meilleures annonces.</div>

    <div class="perks">
        <div class="perk">Gratuit pour commencer, sans CB</div>
        <div class="perk">Scan Vinted 24/7 en continu</div>
        <div class="perk">Alertes Discord, Telegram, Email</div>
    </div>

    <div class="alert alert-error" id="error"></div>
    <form id="registerForm">
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="TonPseudo" required minlength="3">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ton@email.com" required>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="Min. 6 caractères" required minlength="6">
        </div>
        <button type="submit" class="btn btn-gold" id="submitBtn">Créer mon compte →</button>
    </form>
    <div class="divider"></div>
    <div class="links">
        Déjà un compte ? <a href="/login">Se connecter</a><br>
        <a href="/">← Retour à l'accueil</a>
    </div>
</div>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('error');
    btn.disabled = true; btn.textContent = 'Création...';
    error.style.display = 'none';
    try {
        const resp = await fetch('/api/register', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            })
        });
        const data = await resp.json();
        if (data.success) { window.location.href = '/pricing'; }
        else { error.textContent = data.error || 'Erreur'; error.style.display = 'block'; }
    } catch(err) { error.textContent = 'Erreur réseau'; error.style.display = 'block'; }
    btn.disabled = false; btn.textContent = 'Créer mon compte →';
});
</script>
</body>
</html>
